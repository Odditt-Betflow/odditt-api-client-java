openapi: 3.0.3
info:
  title: Odditt B2B Public API
  version: 1.0.0
servers:
- url: https://api.odditt.com
paths:
  /v1/account/api-keys:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ListAPIKeysResponse"
          description: List of API keys
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
      security:
      - BearerAuth: []
      summary: List own API keys
      tags:
      - Account
      x-accepts:
      - application/json
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_CreateAPIKeyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_CreateAPIKeyResponse"
          description: API key created (plaintext returned once)
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: The request was malformed (invalid path/query parameter or
            JSON type mismatch in the body).
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: The request body was syntactically valid JSON but one or more
            fields failed validation; the message names each offending field.
      security:
      - BearerAuth: []
      summary: Create a new API key
      tags:
      - Account
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/api-keys/{key_code}:
    delete:
      parameters:
      - explode: false
        in: path
        name: key_code
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          description: API key deactivated
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_v1_account_api_keys__key_code__delete_409_response"
          description: "The request conflicts with the current resource state. Uses\
            \ the account-envelope shape `{ \"success\": false, \"error\": \"...\"\
            \ }` rather than the standard error envelope."
      security:
      - BearerAuth: []
      summary: Deactivate an API key
      tags:
      - Account
      x-accepts:
      - application/json
  /v1/account/check-endpoint:
    delete:
      responses:
        "200":
          description: Check endpoint deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_v1_account_api_keys__key_code__delete_409_response"
          description: "The request conflicts with the current resource state. Uses\
            \ the account-envelope shape `{ \"success\": false, \"error\": \"...\"\
            \ }` rather than the standard error envelope."
      security:
      - BearerAuth: []
      summary: Delete the check endpoint
      tags:
      - Account
      x-accepts:
      - application/json
    get:
      description: "Returns the URL, method and bearer token preview for the check\
        \ endpoint used by flow quoting. The full bearer token is never returned."
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_CheckEndpointResponse"
          description: Check endpoint configuration (or null data if not configured)
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
      security:
      - BearerAuth: []
      summary: Get the configured check endpoint
      tags:
      - Account
      x-accepts:
      - application/json
    post:
      description: "Stores or updates the URL, method and bearer token used to quote\
        \ flows against the client's own service. A single configuration exists per\
        \ client."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_SetCheckEndpointRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_CheckEndpointResponse"
          description: Check endpoint stored
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: The request was malformed (invalid path/query parameter or
            JSON type mismatch in the body).
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: The request body was syntactically valid JSON but one or more
            fields failed validation; the message names each offending field.
      security:
      - BearerAuth: []
      summary: Set the check endpoint (upsert)
      tags:
      - Account
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/config:
    get:
      responses:
        "200":
          description: Client configuration
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
      security:
      - BearerAuth: []
      summary: Get own client configuration
      tags:
      - Account
      x-accepts:
      - application/json
  /v1/account/secret:
    post:
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_CreateSecretResponse"
          description: Secret created (plaintext returned once)
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
      security:
      - BearerAuth: []
      summary: Create a new client secret
      tags:
      - Account
      x-accepts:
      - application/json
  /v1/account/secrets:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ListSecretsResponse"
          description: List of secrets
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
      security:
      - BearerAuth: []
      summary: List own client secrets
      tags:
      - Account
      x-accepts:
      - application/json
  /v1/account/secrets/{secret_code}:
    delete:
      parameters:
      - explode: false
        in: path
        name: secret_code
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          description: Secret deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_v1_account_api_keys__key_code__delete_409_response"
          description: "The request conflicts with the current resource state. Uses\
            \ the account-envelope shape `{ \"success\": false, \"error\": \"...\"\
            \ }` rather than the standard error envelope."
      security:
      - BearerAuth: []
      summary: Delete a client secret
      tags:
      - Account
      x-accepts:
      - application/json
  /v1/account/usage:
    get:
      parameters:
      - explode: true
        in: query
        name: start_date
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: end_date
        required: false
        schema:
          format: date-time
          type: string
        style: form
      responses:
        "200":
          description: Usage data
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_ErrorResponse"
          description: Missing or invalid credentials.
      security:
      - BearerAuth: []
      summary: Get own usage stats
      tags:
      - Account
      x-accepts:
      - application/json
  /v1/affiliates/deals:
    post:
      description: "Paginated client deals (carousel/featured/list), optionally enriched\
        \ with operator reviews. Scoped to the authenticated client."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_v1_affiliates_deals_post_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Paginated client deals
      tags:
      - Offers
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/affiliates/event-position:
    post:
      description: "Returns live odds across operators for a single event betting\
        \ market position, overlaid with the calling client's best affiliate offer\
        \ per operator. Powers the widget's \"Bet Now\" cart for a single selection.\
        \ Results are scoped to the authenticated client; operators can be gated with\
        \ operator_ids / operator_keys."
      requestBody:
        content:
          application/json:
            example:
              country_code: US
              event_betting_market_position_id: 351558937
              operator_ids:
              - 1
              - 2
              subnational_region_code: NJ
            schema:
              $ref: "#/components/schemas/_v1_affiliates_event_position_post_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Single-bet cart for affiliate mode
      tags:
      - Affiliates
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/affiliates/events:
    post:
      description: Fire-and-forget telemetry. Records one impression (card render)
        or click (deeplink tap). Returns 202 on accept; never blocks the widget's
        click-out.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_v1_affiliates_events_post_request"
        required: true
      responses:
        "202":
          description: Accepted
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Log an impression or click
      tags:
      - Telemetry
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/affiliates/links:
    post:
      description: "Creates a link, or updates the existing one on the natural key\
        \ (operator + geography + category + campaign + label). Resolves operator,\
        \ country, and region at write time; unresolvable codes return 422."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_v1_affiliates_links_post_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Create or upsert a single link
      tags:
      - Links
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/affiliates/links/bulk:
    patch:
      description: Applies a patch to all links matching a filter (e.g. rewrite all
        FanDuel-NJ URLs on a domain change).
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_v1_affiliates_links_bulk_patch_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Bulk patch links by filter
      tags:
      - Links
      x-content-type: application/json
      x-accepts:
      - application/json
    post:
      description: Upserts many links idempotently on the natural key. Accepts a JSON
        array of row objects or a text/csv body (header row). Per-row errors never
        fail the batch. Use ?dry_run=true to validate without persisting.
      parameters:
      - description: "When true, validates the whole batch and returns the per-row\
          \ report without persisting. Always synchronous."
        explode: true
        in: query
        name: dry_run
        required: false
        schema:
          type: boolean
        style: form
      - description: "Force background processing. Batches of 500+ rows are queued\
          \ automatically regardless of this flag. Queued batches return 202 with\
          \ a job_id to poll at /v1/affiliates/links/jobs/{job_id}."
        explode: true
        in: query
        name: async
        required: false
        schema:
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: object
              type: array
          text/csv:
            schema:
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: Processed synchronously
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_v1_affiliates_links_bulk_post_202_response"
          description: Accepted for background processing.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: The request was malformed.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Bulk create/upsert links (JSON or CSV)
      tags:
      - Links
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/affiliates/links/bulk-deactivate:
    post:
      description: Soft-deletes all links matching a filter (e.g. a state goes offline).
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_v1_affiliates_links_bulk_deactivate_post_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Bulk deactivate links by filter
      tags:
      - Links
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/affiliates/links/clicks:
    get:
      description: "Per-link, per-day impression and click counts for the authenticated\
        \ client."
      parameters:
      - explode: true
        in: query
        name: start_date
        required: true
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: end_date
        required: true
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: operator_id
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - explode: true
        in: query
        name: country_code
        required: false
        schema:
          maxLength: 2
          minLength: 2
          type: string
        style: form
      - explode: true
        in: query
        name: subnational_region_code
        required: false
        schema:
          maxLength: 10
          type: string
        style: form
      - explode: true
        in: query
        name: offer_campaign
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: offer_label
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Impression/click rollups
      tags:
      - Reporting
      x-accepts:
      - application/json
  /v1/affiliates/links/inventory-summary:
    get:
      description: Active/inactive link counts grouped by the requested dimension.
      parameters:
      - explode: true
        in: query
        name: group_by
        required: false
        schema:
          default: operator
          enum:
          - operator
          - subnational_region
          - offer_campaign
          - offer_label
          - operator_subnational_region
          - operator_offer_campaign
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: One or more fields failed validation; the message names each
            offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Inventory counts
      tags:
      - Reporting
      x-accepts:
      - application/json
  /v1/affiliates/links/jobs:
    get:
      description: Recent async bulk jobs for the authenticated client.
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List async bulk jobs
      tags:
      - Links
      x-accepts:
      - application/json
  /v1/affiliates/links/jobs/{job_id}:
    get:
      description: "Status, counts, and per-row errors for one async bulk job. Poll\
        \ until status is \"completed\" or \"failed\". Scoped to the authenticated\
        \ client."
      parameters:
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: The request was malformed.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: The requested resource does not exist.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Poll an async bulk job
      tags:
      - Links
      x-accepts:
      - application/json
  /v1/affiliates/lookups/affiliate-networks:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Affiliate networks
      tags:
      - Lookups
      x-accepts:
      - application/json
  /v1/affiliates/lookups/offer-categories:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/affiliate_ErrorResponse"
          description: Unexpected server error.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Offer categories
      tags:
      - Lookups
      x-accepts:
      - application/json
  /v1/affiliates/lookups/operator-jurisdictions:
    get:
      description: Where we believe an operator is live. Informational only — not
        an upload gate.
      parameters:
