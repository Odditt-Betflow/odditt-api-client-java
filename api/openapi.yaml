  /v1/trends/flows/quote:
    post:
      description: "Accepts a JSON array of 1..50 flow specifications and, for each\
        \ one, forwards a hydrated payload to the URL the caller has registered under\
        \ `/v1/account/check-endpoint`. Outbound calls run in parallel; the response\
        \ is a JSON array with one entry per input item, in input order. Per-item\
        \ failures are encoded in each entry's `status` (and `body`) so one bad operator\
        \ response does not poison the others. Batch-level failures map to HTTP 4xx\
        \ without an array body — 412 when the caller has not configured a check endpoint,\
        \ 422 on validation failure."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/trends_QuoteFlowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_QuoteFlowResponse"
          description: Array of per-item results in input order.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Malformed request body.
        "412":
          description: Caller has not configured a check endpoint.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: "Validation failed (empty batch, batch too large, or any item\
            \ failed field validation)."
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Quote a batch of flows against the caller's configured check endpoint
      tags:
      - Trends
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/trends/flows/quote-sandbox:
    post:
      description: Drop-in stand-in for a real operator's pricing endpoint. Accepts
        ONE hydrated pricing payload (the exact shape that /v1/trends/flows/quote
        POSTs to a configured check endpoint) and returns synthetic pricing- response
        data with deterministic `button_payload` values and randomly- injected failure
        modes (~15% rate). Integrators wire this URL into /v1/account/check-endpoint
        as `url` to round-trip the widget call entirely on platform infrastructure
        without a real operator. Not for production traffic.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/trends_QuoteSandboxRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_QuoteSandboxResponse"
          description: "Mock pricing response, shape depends on single vs parlay."
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Malformed request body.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Validation failed.
      summary: Mock operator pricing endpoint — for sandbox / development use
      tags:
      - Trends
      x-content-type: application/json
      x-accepts:
      - application/json
