  /v1/trends/widget/event:
    post:
      description: "Records a single client-side widget interaction (impression, click,\
        \ dwell, or cart action) for analytics. Accepts a typed envelope `{event_type,\
        \ mode, event_body}`: `event_type` is a closed enum naming the interaction,\
        \ optional `mode` describes the widget mode, and `event_body` is an arbitrary\
        \ JSON object whose shape depends on the event. Available only to widget API\
        \ keys. Fire-and-forget: returns `202 Accepted` once the event is queued;\
        \ the response does not guarantee durable storage."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/trends_WidgetEventRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_WidgetEventResponse"
          description: Event accepted for asynchronous processing.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Malformed request body.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: The API key is not a widget key.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: "Validation failed (unknown event_type, invalid mode, missing\
            \ event_body, or event_body is not a JSON object)."
      security:
      - ApiKeyAuth: []
      summary: Submit a widget telemetry event
      tags:
      - Trends
      x-content-type: application/json
      x-accepts:
      - application/json
