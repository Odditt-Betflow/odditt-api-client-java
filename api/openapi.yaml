  /v1/historical/odds/{event_id}.{ext}:
    get:
      description: |
        Resolves the requested per-event file for the authenticated client and streams the JSON or CSV payload back. The response body is the raw file content (not the manifest envelope); the API takes care of fetching the bytes from the underlying CDN so callers see a single HTTP call per file.

        The `sha256` of the bytes-at-rest is exposed as a strong `ETag`. Clients can short-circuit with `If-None-Match` to receive `304 Not Modified`. `Range` requests are forwarded upstream and `206 Partial Content` responses are relayed unchanged — useful for resuming multi-MB CSV downloads.
      parameters:
      - description: Canonical event identifier.
        explode: false
        in: path
        name: event_id
        required: true
        schema:
          format: int64
          minimum: 1
          type: integer
        style: simple
      - description: File format. `json` returns `application/json`; `csv` returns
          `text/csv`.
        explode: false
        in: path
        name: ext
        required: true
        schema:
          enum:
          - json
          - csv
          type: string
        style: simple
      - description: Payload schema version. Defaults to `v1` when omitted.
        explode: true
        in: query
        name: schema_version
        required: false
        schema:
          default: v1
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                format: binary
                type: string
          description: File payload streamed back to the client.
          headers:
            Content-Disposition:
              description: Always `attachment; filename="event_<event_id>.<ext>"`.
              explode: false
              schema:
                type: string
              style: simple
            ETag:
              description: Strong validator based on the SHA-256 of the file bytes-at-rest.
              explode: false
              schema:
                type: string
              style: simple
        "206":
          description: Partial content when the client provided a `Range` header.
        "304":
          description: Not modified — the client supplied a matching `If-None-Match`.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: The request was malformed (invalid path/query parameter or
            JSON type mismatch in the body).
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Missing or invalid credentials.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Authenticated but not permitted to access this resource.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: The requested resource does not exist.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: The request body was syntactically valid JSON but one or more
            fields failed validation; the message names each offending field.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Unexpected server error.
        "502":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/trends_ErrorResponse"
          description: Upstream content delivery unavailable.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Download a per-event historical odds file
      tags:
      - Historical
      x-accepts:
      - application/json
      - text/csv
